<!DOCTYPE html>

<html lang="{{site.locale}}">
   <head>
    <meta charset="utf-8">
    <meta name="color-scheme"            content="light dark">
    <meta name="description"             content="{{ page.abstract | default: site.description }}">
    <meta name="referrer"                content="no-referrer">
    <meta name="supports-reduced-motion" content="reduce">
    <meta name="text-scale"              content="scale">
    <meta name="theme-color"             content="{{site.data.colors.HINT_CHROME_DM}}" media="(prefers-color-scheme: dark)">
    <meta name="theme-color"             content="{{site.data.colors.HINT_CHROME_LM}}" media="not (prefers-color-scheme: dark)">
    <meta name="viewport"                content="width=device-width,initial-scale=1">

    <title>
      {%- if page.title -%}
        {{- page.title | escape -}}
        {{- " ⟡ " -}}
      {%- endif -%}
      {{- site.title | escape -}}
    </title>

    <link
      as            = "font"
      crossorigin   = "anonymous"
      fetchpriority = "high"
      rel           = "preload"
      href          = "/_subresources/fonts/imbue.woff2">
    <link
      as            = "font"
      crossorigin   = "anonymous"
      fetchpriority = "high"
      rel           = "preload"
      href          = "/_subresources/fonts/bodoni-moda-roman.woff2">
    <link
      as            = "font"
      crossorigin   = "anonymous"
      fetchpriority = "low"
      rel           = "preload"
      href          = "/_subresources/fonts/bodoni-moda-italic.woff2">
    <link
      href          = "/_subresources/styles/document.css"
      rel           = "stylesheet">
    <link
      href          = "/_subresources/site-dm.webmanifest"
      media         = "(prefers-color-scheme: dark)"
      rel           = "manifest">
    <link
      href          = "/_subresources/site-lm.webmanifest"
      media         = "not (prefers-color-scheme: dark)"
      rel           = "manifest">
  </head>

      <h1> Last Odyssey </h1>
      <search>
        {% include google-search.html %}
      </search>
    </header>

        <h1>{{ page.title }}</h1>
        {{ content }}
      </main>
      <aside>
        {% capture toc %}{% include table-of-contents.md %}{% endcapture %}
