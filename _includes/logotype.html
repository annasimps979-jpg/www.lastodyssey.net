<!-- This is a tentative (but perhaps viable) implementation of the LO logotype.
     The only challenging aspect of realizing the logotype (without resorting to
     premature rasterization or employing non-textual representations of “text”)
     is that it includes a stroke drawn not around individual constituent paths,
     but rather around the path that is the *union* of all its constituent paths
     — i.e., the paths to stroke aren’t really those of the meteor or glyphs but
     instead their OR composite. There are a number of ways we could achieve the
     intended effect generically, but I noticed that something about the palette
     — pure white stroke + pure black text fill — permits a non-generic solution
     that was a lil too clever fer me to have been able to resist the temptation
     lol, so this candidate implementation takes advantage of what’s really just
     an accidental “mathematical” feature of the palette and “cheats”: we stroke
     the glyph and meteor paths separately in their own layers ... which we then
     multiply. Black times any color is black, so the text fill ends up the same
     as as with normal compositing. White times any color, however, is the other
     color ... unless that other color’s alpha channel is zero, in which case we
     would get (opaque) white instead. Thus anywhere the text stroke would paint
     over the meteor fill, it “disappears”, but anywhere outside the fill, it’ll
     also paint the same as it would have with normal compositing. This wouldn’t
     be true if there were a non-transparent layer under the logotype because it
     would “erase” the text stroke just as the meteor fill does — but to prevent
     that all we need to do is establish paint containment so that the composite
     of just these two layers is treated like “output” to be composited normally
     with whatever lay behind ’em (using isolation: isolate, or contain: paint).

     The size of the logotype is effectively determined by the size of the font.
     At the moment, there’s only one usage of the logotype at a single size, but
     that size is a text-scale-honoring relative size rather than a raster size,
     and in any case I would guess that soon enuf there will be occasion to make
     use of the logotype in further contexts where the size is much larger (just
     a hunch, but I used to get paid six figure salaries fer those hunches, lol)
     so another key consideration here is that the stroke thickness should *not*
     linearly scale with the paths themselves. Fer now we can achieve this using
     (fer the meteor) vector-effect=non-scaling-stroke and (fer the text) stroke
     width declared in terms of CSS pixels. However that ain’t ideal either; the
     ideal behavior is fer the strokes to scale logarithmically with minimum and
     maximum values. Depending on how this candidate implementation works out, I
     may return to implement the more sophisticated behaviors in the future.

     This _include ain’t really ideal in its organization, but eh; again, we can
     always refine it down the line. Note that these scoped styles will apply to
     the parent element where used and that the gradient has document scope. -->

<style>
  @namespace     "http://www.w3.org/1999/xhtml";
  @namespace svg "http://www.w3.org/2000/svg";

  @scope {
    :scope {
      display                   : inline-block;
      margin                    : unset;
      position                  : relative;
      text-wrap-mode            : nowrap;
      width                     : min-content;

      font-size                 : 3.750rem;              /*   60px @ dflt rem */
      font-size-adjust          : cap-height 0.8;        /*   fills optically */
      line-height               : 1;                     /*   i.e. use f-size */
      padding-block-end         : calc(1em / 4);         /*   15px @ dflt rem */
                                                         /*   --------------- */
                                                         /* = 75px @ dflt rem */
      --title-opsz              : 60;
      --title-wght              : 500;
      font-variation-settings   : "opsz" var(--title-opsz),
                                  "wght" var(--title-wght);

      letter-spacing            : 0.0200em;
      padding-inline-end        : 0.1131em;
      padding-inline-start      : calc(1em / 6);

      -webkit-text-stroke-color : white !important;
      -webkit-text-stroke-width : 1.25px;
      color                     : black !important;
      isolation                 : isolate !important;
      paint-order               : stroke fill !important;
    }

    div {
      mix-blend-mode: multiply;
    }

    svg|svg {
      bottom       : 0.00em;
      height       : 0.84em;
      left         : 0.10em;
      position     : absolute;
      width        : auto;
    }
  }
</style>
